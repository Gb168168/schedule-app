<h1>班表</h1>

<div class="form-card">
  <h2>新增班表</h2>

  <input id="date" type="date" />
  
  <select id="shift">
    <option value="早班">早班</option>
    <option value="晚班">晚班</option>
    <option value="一般班">一般班</option>
  </select>

  <input id="startTime" type="time" />
  <input id="endTime" type="time" />
  <input id="store" type="text" placeholder="地區" />
  <input id="department" type="text" placeholder="部門" />

  <button id="add-btn">新增班表</button>
</div>

<h2>班表列表</h2>
<div id="schedule-list">載入中...</div>

<script type="module" src="app.js"></script>
